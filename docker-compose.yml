version: "3.8"

services:
  backend:
    build:
      context: ./back
      # target: final # используем финальный stage из многоступенчатой сборки
    ports:
      - "5005:5005"
    environment:
      - DATABASE_URL=sqlite:///app/data/database.db
    # - PORT=5000
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro
      - ./migrations:/app/migrations
      # - ./templates:/app/templates
      # - ./static:/app/static
      # Монтируем Cargo.toml и Cargo.lock
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - app_data:/app/data
      # - ./database.db:/app/database.db
      # - ./database.db:/app/database.db
      # - ./templates:/app/static
    networks:
      - app-network
  frontend:
    volumes:
      - ./front:/app
      # - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    build:
      context: ./front
    networks:
      - app-network
  nginx:
    build:
      context: ./nginx
    ports:
      - "80:80"
      - "443:443"
    # volumes:
    # - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
volumes:
  app_data:

networks:
  app-network:
    driver: bridge
